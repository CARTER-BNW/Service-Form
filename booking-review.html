<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Your Booking</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #fff;
        text-align: center;
    }
    .back {
        position: absolute;
        left: 20px;
        top: 20px;
        color: #f2f2f2;
        text-decoration: none;
        font-size: 0.95rem;
    }
    header {
        padding: 40px 20px 5px;
        font-size: 2.2rem;
        font-weight: 700;
    }
    .step {
        font-size: 1rem;
        color: #ccc;
        margin-bottom: 20px;
    }
    .box {
        width: 95%;
        max-width: 600px;
        margin: 40px auto;
        background: #1a1a1a;
        padding: 35px;
        border-radius: 16px;
        border: 1px solid #333;
        animation: fadeIn 0.6s ease;
        box-sizing: border-box;
        text-align: left;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .row {
        margin-bottom: 18px;
        font-size: 1.2rem;
    }
    .label {
        font-weight: 700;
        color: #ccc;
    }
    .button {
        display: block;
        margin: 40px auto;
        padding: 18px;
        width: 80%;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 1.3rem;
        transition: 0.25s;
        text-align: center;
        cursor: pointer;
    }
    .button:hover { background: #444; }
</style>
</head>
<body>

<a class="back" href="contact.html">← Back</a>
<header>Review Your Booking</header>
<div class="step">Step 5 of 6 — Confirm Details</div>

<div class="box">
    <div class="row"><span class="label">Service:</span> <span id="service"></span></div>
    <div class="row"><span class="label">Package:</span> <span id="package"></span></div>
    <div class="row"><span class="label">Date:</span> <span id="date"></span></div>
    <div class="row"><span class="label">Time:</span> <span id="time"></span></div>
    <div class="row"><span class="label">First Name:</span> <span id="fname"></span></div>
    <div class="row"><span class="label">Last Name:</span> <span id="lname"></span></div>
    <div class="row"><span class="label">Email:</span> <span id="email"></span></div>
    <div class="row"><span class="label">Phone:</span> <span id="phone"></span></div>
    <div class="row"><span class="label">Comments:</span> <span id="comments"></span></div>
</div>

<div class="button" id="confirmBtn">Confirm Booking</div>

<script>
const data = {
    service:  localStorage.getItem("service")  || "",
    package:  localStorage.getItem("package")  || "",
    date:     localStorage.getItem("date")     || "",
    time:     localStorage.getItem("time")     || "",
    fname:    localStorage.getItem("fname")    || "",
    lname:    localStorage.getItem("lname")    || "",
    email:    localStorage.getItem("email")    || "",
    phone:    localStorage.getItem("phone")    || "",
    comments: localStorage.getItem("comments") || ""
};

document.getElementById("service").textContent  = data.service;
document.getElementById("package").textContent  = data.package;
document.getElementById("date").textContent     = data.date;
document.getElementById("time").textContent     = data.time;
document.getElementById("fname").textContent    = data.fname;
document.getElementById("lname").textContent    = data.lname;
document.getElementById("email").textContent    = data.email;
document.getElementById("phone").textContent    = data.phone;
document.getElementById("comments").textContent = data.comments;

document.getElementById("confirmBtn").addEventListener("click", () => {
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://formsubmit.co/bnw.carter@gmail.com";

    const addField = (name, value) => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.value = value;
        form.appendChild(input);
    };

    addField("Service", data.service);
    addField("Package", data.package);
    addField("Date", data.date);
    addField("Time", data.time);
    addField("First Name", data.fname);
    addField("Last Name", data.lname);
    addField("Email", data.email);
    addField("Phone", data.phone);
    addField("Comments", data.comments);

    // FormSubmit options
    addField("_subject", "New Photography Booking");
    addField("_cc", data.email); // send confirmation to client
    // Replace with your real URL when deployed:
    addField("_next", "https://yourdomain.com/booking-confirmed.html");

    document.body.appendChild(form);
    form.submit();
});
</script>

</body>
</html>
