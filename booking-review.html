<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Your Booking</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #fff;
        text-align: center;
    }

    header {
        padding: 40px 20px;
        font-size: 2.2rem;
        font-weight: 700;
    }

    .box {
        width: 95%;
        max-width: 600px;
        margin: 40px auto;
        background: #1a1a1a;
        padding: 35px;
        border-radius: 16px;
        border: 1px solid #333;
        animation: fadeIn 0.6s ease;
        box-sizing: border-box;
        text-align: left;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .row {
        margin-bottom: 18px;
        font-size: 1.2rem;
    }

    .label {
        font-weight: 700;
        color: #ccc;
    }

    .button {
        display: block;
        margin: 40px auto;
        padding: 18px;
        width: 80%;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 1.3rem;
        transition: 0.25s;
        text-align: center;
    }

    .button:hover {
        background: #444;
    }
</style>
</head>

<body>

<header>Review Your Booking</header>

<div class="box">
    <div class="row"><span class="label">Service:</span> <span id="service"></span></div>
    <div class="row"><span class="label">Package:</span> <span id="package"></span></div>
    <div class="row"><span class="label">Date:</span> <span id="date"></span></div>
    <div class="row"><span class="label">Time:</span> <span id="time"></span></div>
    <div class="row"><span class="label">First Name:</span> <span id="fname"></span></div>
    <div class="row"><span class="label">Last Name:</span> <span id="lname"></span></div>
    <div class="row"><span class="label">Email:</span> <span id="email"></span></div>
    <div class="row"><span class="label">Phone:</span> <span id="phone"></span></div>
    <div class="row"><span class="label">Comments:</span> <span id="comments"></span></div>
</div>

<a class="button" href="booking-confirmed.html">Confirm Booking</a>

<script>
    // Read data from localStorage (set on contact page)
    document.getElementById("service").textContent  = localStorage.getItem("service")  || "";
    document.getElementById("package").textContent  = localStorage.getItem("package")  || "";
    document.getElementById("date").textContent     = localStorage.getItem("date")     || "";
    document.getElementById("time").textContent     = localStorage.getItem("time")     || "";
    document.getElementById("fname").textContent    = localStorage.getItem("fname")    || "";
    document.getElementById("lname").textContent    = localStorage.getItem("lname")    || "";
    document.getElementById("email").textContent    = localStorage.getItem("email")    || "";
    document.getElementById("phone").textContent    = localStorage.getItem("phone")    || "";
    document.getElementById("comments").textContent = localStorage.getItem("comments") || "";
</script>

</body>
</html>
