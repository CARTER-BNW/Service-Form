<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #fff;
        text-align: center;
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    header {
        padding: 60px 20px 20px;
        font-size: 2.4rem;
        font-weight: 700;
    }

    p {
        font-size: 1.4rem;
        max-width: 600px;
        margin: 20px auto;
        color: #ccc;
    }

    .button {
        display: inline-block;
        margin-top: 40px;
        padding: 16px 30px;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 1.2rem;
        transition: 0.25s;
    }

    .button:hover {
        background: #444;
    }
</style>
</head>

<body>

<header>Booking Confirmed</header>

<p>Thank you for your booking.  
I’ll be in touch shortly to confirm all details and next steps.</p>

</html>
