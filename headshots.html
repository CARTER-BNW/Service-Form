<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headshot Packages</title>

<style>
    body { margin:0; font-family:"Inter",sans-serif; background:#0d0d0d; color:#fff; text-align:center; }
    .back { position:absolute; left:20px; top:20px; color:#fff; text-decoration:none; font-size:0.95rem; }
    header { padding:40px 20px 5px; font-size:2.2rem; font-weight:700; }
    .step { font-size:1rem; color:#ccc; margin-bottom:20px; }
    .grid { max-width:900px; margin:40px auto; padding:0 20px; display:grid; gap:30px; }
    .pkg { background:#1a1a1a; padding:30px; border-radius:16px; border:1px solid #333; cursor:pointer; transition:0.25s; }
    .pkg:hover { background:#222; }
    .pkg-title { font-size:1.6rem; font-weight:700; margin-bottom:10px; }
    .pkg-desc { font-size:1rem; color:#ccc; margin-bottom:20px; }
</style>
</head>

<body>

<a class="back" href="index.html">← Back</a>
<header>Headshot Packages</header>
<div class="step">Step 2 of 6 — Select Package</div>

<div class="grid">
    <div class="pkg" data-package="Studio Headshots">
        <div class="pkg-title">Studio Headshots</div>
        <div class="pkg-desc">30 minutes • 10 edited photos</div>
    </div>

    <div class="pkg" data-package="Outdoor Headshots">
        <div class="pkg-title">Outdoor Headshots</div>
        <div class="pkg-desc">1 hour • 20 edited photos</div>
    </div>

    <div class="pkg" data-package="Corporate Headshots">
        <div class="pkg-title">Corporate Headshots</div>
        <div class="pkg-desc">Team packages available</div>
    </div>
</div>

<script>
document.querySelectorAll('.pkg').forEach(pkg => {
    pkg.addEventListener('click', () => {
        localStorage.setItem('service', 'Headshots');
        localStorage.setItem('package', pkg.getAttribute('data-package'));
        window.location.href = "calendar.html";
    });
});
</script>

</body>
</html>
