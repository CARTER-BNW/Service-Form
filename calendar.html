<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Date & Time</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #f2f2f2;
        text-align: center;
    }
    .back {
        position: absolute;
        left: 20px;
        top: 20px;
        color: #f2f2f2;
        text-decoration: none;
        font-size: 0.95rem;
    }
    header {
        padding: 40px 20px 5px;
        font-size: 2.2rem;
        font-weight: 700;
    }
    .step {
        font-size: 1rem;
        color: #ccc;
        margin-bottom: 20px;
    }
    .calendar-container {
        width: 95%;
        max-width: 700px;
        margin: 30px auto;
        background: #1a1a1a;
        padding: 30px;
        border-radius: 16px;
        border: 1px solid #333;
        animation: fadeIn 0.6s ease;
        box-sizing: border-box;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-size: 1.4rem;
        font-weight: 600;
    }
    .calendar-header button {
        background: #333;
        border: none;
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.25s;
    }
    .calendar-header button:hover { background: #444; }
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 12px;
        width: 100%;
        box-sizing: border-box;
    }
    .day {
        aspect-ratio: 1 / 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0d0d0d;
        border-radius: 10px;
        border: 1px solid #333;
        cursor: pointer;
        transition: 0.25s;
        font-size: 1.2rem;
    }
    .day:hover { background: #222; }
    .day.selected {
        background: #ffffff;
        color: #000;
        border-color: #fff;
        font-weight: 700;
    }
    .time-container {
        width: 95%;
        max-width: 700px;
        margin: 40px auto;
        background: #1a1a1a;
        padding: 30px;
        border-radius: 16px;
        border: 1px solid #333;
        animation: fadeIn 0.6s ease;
        box-sizing: border-box;
    }
    .time-container h2 {
        margin-bottom: 20px;
        font-size: 1.6rem;
    }
    .time-slot {
        padding: 14px;
        margin: 8px 0;
        background: #0d0d0d;
        border-radius: 8px;
        border: 1px solid #333;
        cursor: pointer;
        transition: 0.25s;
        font-size: 1.1rem;
    }
    .time-slot:hover { background: #222; }
    .time-slot.selected {
        background: #ffffff;
        color: #000;
        border-color: #fff;
        font-weight: 700;
    }
    .button {
        display: block;
        margin: 40px auto;
        padding: 18px;
        width: 80%;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 1.3rem;
        transition: 0.25s;
        cursor: pointer;
    }
    .button:hover { background: #444; }
    @media (max-width: 700px) {
        .calendar-container { padding: 20px; }
        .calendar-grid { gap: 8px; }
        .day { font-size: 1rem; border-radius: 8px; }
        .time-container { padding: 20px; }
        .time-slot { padding: 12px; font-size: 1rem; }
    }
    @media (min-width: 701px) {
        .day { font-size: 1.5rem; padding: 22px; }
        .calendar-header { font-size: 1.8rem; }
        .time-container h2 { font-size: 2rem; }
        .time-slot { font-size: 1.4rem; padding: 18px; }
    }
</style>
</head>
<body>

<a class="back" href="select-package.html">← Back</a>
<header>Select Date & Time</header>
<div class="step">Step 3 of 6 — Select Date & Time</div>

<div class="calendar-container">
    <div class="calendar-header">
        <button onclick="prevMonth()">‹</button>
        <div id="monthYear"></div>
        <button onclick="nextMonth()">›</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="time-container">
    <h2>Select Start Time</h2>
    <div id="timeSlots"></div>
</div>

<div class="button" id="nextBtn">Next: Contact Details</div>

<script>
    let currentDate = new Date();
    let selectedDate = null;
    let selectedTime = null;

    function renderCalendar() {
        const monthYear = document.getElementById("monthYear");
        const grid = document.getElementById("calendarGrid");

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        monthYear.textContent = currentDate.toLocaleString("default", { month: "long" }) + " " + year;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        grid.innerHTML = "";

        for (let i = 0; i < firstDay; i++) {
            grid.innerHTML += `<div></div>`;
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const div = document.createElement("div");
            div.classList.add("day");
            div.textContent = day;

            div.onclick = () => {
                document.querySelectorAll(".day").forEach(d => d.classList.remove("selected"));
                div.classList.add("selected");
                selectedDate = new Date(year, month, day);
            };

            grid.appendChild(div);
        }
    }

    function prevMonth() {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    }

    function nextMonth() {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    }

    function renderTimeSlots() {
        const container = document.getElementById("timeSlots");
        container.innerHTML = "";

        for (let hour = 0; hour < 24; hour++) {
            ["00", "30"].forEach(min => {
                const time = `${hour.toString().padStart(2, "0")}:${min}`;
                const div = document.createElement("div");
                div.classList.add("time-slot");
                div.textContent = time;

                div.onclick = () => {
                    document.querySelectorAll(".time-slot").forEach(t => t.classList.remove("selected"));
                    div.classList.add("selected");
                    selectedTime = time;
                };

                container.appendChild(div);
            });
        }
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
        if (selectedDate && selectedTime) {
            const d = selectedDate;
            const dateString = d.toLocaleDateString();
            localStorage.setItem("date", dateString);
            localStorage.setItem("time", selectedTime);
            window.location.href = "contact.html";
        } else {
            alert("Please select a date and time.");
        }
    });

    renderCalendar();
    renderTimeSlots();
</script>

</body>
</html>
