<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Date & Time</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #f2f2f2;
        text-align: center;
    }

    header {
        padding: 40px 20px;
        font-size: 2rem;
        font-weight: 700;
    }

    .form-box {
        background: #1a1a1a;
        padding: 30px;
        max-width: 500px;
        margin: 40px auto;
        border-radius: 12px;
        border: 1px solid #333;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #444;
        background: #0d0d0d;
        color: #fff;
        font-size: 1rem;
    }

    .button {
        display: block;
        margin-top: 20px;
        padding: 15px;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.25s;
    }

    .button:hover {
        background: #444;
    }
</style>
</head>

<body>

<header>Select Date & Time</header>

<div class="form-box">
    <label>Date</label>
    <input type="date">

    <label>Start Time</label>
    <input type="time">

    <a class="button" href="contact.html">Next: Contact Details</a>
</div>

</body>
</html>
