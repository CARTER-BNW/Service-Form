<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Details</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #f2f2f2;
        text-align: center;
    }
    .back {
        position: absolute;
        left: 20px;
        top: 20px;
        color: #f2f2f2;
        text-decoration: none;
        font-size: 0.95rem;
    }
    header {
        padding: 40px 20px 5px;
        font-size: 2.2rem;
        font-weight: 700;
    }
    .step {
        font-size: 1rem;
        color: #ccc;
        margin-bottom: 20px;
    }
    .form-box {
        width: 95%;
        max-width: 600px;
        margin: 40px auto;
        background: #1a1a1a;
        padding: 35px;
        border-radius: 16px;
        border: 1px solid #333;
        animation: fadeIn 0.6s ease;
        box-sizing: border-box;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    input, textarea {
        width: 100%;
        padding: 16px;
        margin: 12px 0;
        border-radius: 10px;
        border: 1px solid #444;
        background: #0d0d0d;
        color: #fff;
        font-size: 1.1rem;
        transition: 0.25s;
        box-sizing: border-box;
    }
    input:focus, textarea:focus {
        border-color: #fff;
        outline: none;
        background: #111;
    }
    textarea {
        height: 140px;
        resize: none;
    }
    .button {
        display: block;
        margin-top: 25px;
        padding: 18px;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 1.3rem;
        transition: 0.25s;
        cursor: pointer;
    }
    .button:hover { background: #444; }
    @media (max-width: 700px) {
        input, textarea { font-size: 1rem; padding: 14px; }
    }
</style>
</head>
<body>

<a class="back" href="calendar.html">← Back</a>
<header>Contact Details</header>
<div class="step">Step 4 of 6 — Your Details</div>

<div class="form-box">
    <input id="fname" type="text" placeholder="First Name">
    <input id="lname" type="text" placeholder="Last Name">
    <input id="email" type="email" placeholder="Email">
    <input id="phone" type="tel" placeholder="Phone Number">
    <textarea id="comments" placeholder="Additional Comments"></textarea>
    <div class="button" id="submitBtn">Next: Review Booking</div>
</div>

<script>
document.getElementById("submitBtn").addEventListener("click", function() {
    localStorage.setItem("fname", document.getElementById("fname").value);
    localStorage.setItem("lname", document.getElementById("lname").value);
    localStorage.setItem("email", document.getElementById("email").value);
    localStorage.setItem("phone", document.getElementById("phone").value);
    localStorage.setItem("comments", document.getElementById("comments").value);
    window.location.href = "booking-review.html";
});
</script>

</body>
</html>
