<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Package</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #f2f2f2;
        text-align: center;
    }

    header {
        padding: 40px 20px;
        font-size: 2.2rem;
        font-weight: 700;
    }

    /* Container for all packages */
    .package-grid {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
        display: grid;
        gap: 30px;
    }

    /* Full-image button style */
    .package-button {
        position: relative;
        height: 260px;
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        display: block;
        text-decoration: none;
        transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .package-button:hover {
        transform: scale(1.04);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }

    /* Background images (replace with your own) */
    .basic-img    { background: url('basic.jpg') center/cover no-repeat; }
    .halfday-img  { background: url('halfday.jpg') center/cover no-repeat; }
    .fullday-img  { background: url('fullday.jpg') center/cover no-repeat; }

    /* Dark overlay */
    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        transition: background 0.3s ease;
    }

    .package-button:hover .overlay {
        background: rgba(0, 0, 0, 0.25);
    }

    /* Text on image */
    .label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-shadow: 0 0 12px rgba(0,0,0,0.7);
        pointer-events: none;
    }

    .subtext {
        position: absolute;
        top: 62%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #f2f2f2;
        font-size: 1rem;
        opacity: 0.9;
        pointer-events: none;
    }

    /* Mobile */
    @media (max-width: 700px) {
        .package-button {
            height: 220px;
        }
    }
</style>
</head>

<body>

<header>Select Your Package</header>

<div class="package-grid">

    <a href="calendar.html?package=basic" class="package-button basic-img">
        <div class="overlay"></div>
        <div class="label">Basic Package</div>
        <div class="subtext">4 hours • 200+ edited photos</div>
    </a>

    <a href="calendar.html?package=halfday" class="package-button halfday-img">
        <div class="overlay"></div>
        <div class="label">Half‑Day Package</div>
        <div class="subtext">6 hours • 500+ edited photos</div>
    </a>

    <a href="calendar.html?package=fullday" class="package-button fullday-img">
        <div class="overlay"></div>
        <div class="label">Full‑Day Package</div>
        <div class="subtext">12 hours • 800+ edited photos</div>
    </a>

</div>

</body>
</html>
