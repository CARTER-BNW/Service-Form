<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Services</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #f2f2f2;
        text-align: center;
    }

    header {
        padding: 40px 20px 10px;
        font-size: 2.2rem;
        font-weight: 700;
    }

    /* 2×2 grid, wider cards */
    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 30px;
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
    }

    .service-card {
        background: #1a1a1a;
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #333;
        transition: 0.25s;
    }

    .service-card:hover {
        background: #222;
        border-color: #666;
        transform: translateY(-3px);
    }

    .hero-image {
        width: 100%;
        height: 220px;
        background: #0d0d0d url('your-image.jpg') center/cover no-repeat;
        border-radius: 10px;
        border: 1px solid #333;
        margin-bottom: 20px;
    }

    .button {
        display: inline-block;
        padding: 15px 25px;
        background: #333;
        color: #fff;
        text-decoration: none;
        font-size: 1.2rem;
        border-radius: 10px;
        border: 1px solid #444;
        transition: 0.25s;
    }

    .button:hover {
        background: #444;
        border-color: #666;
    }

    /* Mobile: stack into 1 column */
    @media (max-width: 700px) {
        .grid {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<header>Available Services</header>

<div class="grid">

    <div class="service-card">
        <div class="hero-image"></div>
        <a class="button" href="wedding.html">Wedding</a>
    </div>

    <div class="service-card">
        <div class="hero-image"></div>
        <a class="button" href="model.html">Model Shoot</a>
    </div>

    <div class="service-card">
        <div class="hero-image"></div>
        <a class="button" href="headshots.html">Headshots</a>
    </div>

    <div class="service-card">
        <div class="hero-image"></div>
        <a class="button" href="events.html">Events</a>
    </div>

</div>

</body>
</html>
