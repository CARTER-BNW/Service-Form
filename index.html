<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Services</title>

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0d0d0d;
        color: #f2f2f2;
        text-align: center;
    }

    header {
        padding: 40px 20px 10px;
        font-size: 2.2rem;
        font-weight: 700;
    }

    /* Bigger 2×2 grid */
    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 35px;
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
    }

    /* Bigger image buttons */
    .service-button {
        position: relative;
        height: 340px; /* increased from 260px */
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .service-button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.18);
    }

    /* Background images */
    .wedding-img  { background: url('wedding.jpg') center/cover no-repeat; }
    .model-img    { background: url('model.jpg') center/cover no-repeat; }
    .headshot-img { background: url('headshot.jpg') center/cover no-repeat; }
    .event-img    { background: url('event.jpg') center/cover no-repeat; }

    /* Overlay */
    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        transition: background 0.3s ease;
    }

    .service-button:hover .overlay {
        background: rgba(0, 0, 0, 0.25);
    }

    /* Text */
    .label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-shadow: 0 0 12px rgba(0,0,0,0.7);
        pointer-events: none;
    }

    /* Mobile: stack into 1 column */
    @media (max-width: 700px) {
        .grid {
            grid-template-columns: 1fr;
        }
        .service-button {
            height: 260px;
        }
    }
</style>
</head>

<body>

<header>Available Services</header>

<div class="grid">

    <a href="wedding.html" class="service-button wedding-img">
        <div class="overlay"></div>
        <div class="label">Wedding</div>
    </a>

    <a href="model.html" class="service-button model-img">
        <div class="overlay"></div>
        <div class="label">Model Shoot</div>
    </a>

    <a href="headshots.html" class="service-button headshot-img">
        <div class="overlay"></div>
        <div class="label">Headshots</div>
    </a>

    <a href="events.html" class="service-button event-img">
        <div class="overlay"></div>
        <div class="label">Events</div>
    </a>

</div>

</body>
</html>
